# 部署到腾讯云 CloudBase 静态托管
# 参考：https://docs.cloudbase.net/hosting/cli-devops

name: Deploy to CloudBase Static Hosting

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      CI: "true"

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 安装依赖
        run: npm ci

      - name: 构建项目
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD }}
          VITE_BASE_PATH: "./"
        run: npm run build

      - name: 登录 CloudBase
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
        run: |
          export TCB_SECRET_ID="$(echo -n "$TCB_SECRET_ID" | tr -d '\n\r' | xargs)"
          export TCB_SECRET_KEY="$(echo -n "$TCB_SECRET_KEY" | tr -d '\n\r' | xargs)"
          npx -p @cloudbase/cli tcb login --apiKeyId "$TCB_SECRET_ID" --apiKey "$TCB_SECRET_KEY"

      - name: 部署到 CloudBase 静态托管
        env:
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: npx -p @cloudbase/cli tcb hosting deploy ./dist / -e "$TCB_ENV_ID"
